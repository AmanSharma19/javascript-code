<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM by Chai Aur Code</title>
</head>
<body style="background-color: blue; color: white;">
    <div class="parent"> 
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>
<script>
    const parent = document.querySelector('.parent');
    console.log(parent);
    console.log(parent.children); // children collection
    console.log(parent.childNodes); // childNodes collection
    console.log(parent.firstChild); // first child node
    console.log(parent.lastChild); // last child node
    console.log(parent.firstElementChild); // first child element
    console.log(parent.lastElementChild); // last child element 
    console.log(parent.children[0]); // first child element using children collection

    for(let i=0; i<parent.children.length; i++){
        console.log(parent.children[i].innerHTML); 
    }

    parent.children[0].style.backgroundColor = "red"; // Example of changing style
    const dayOne = document.querySelector('.day'); // Selects the first element with class 'day'
    console.log(dayOne); // Logs the first element with class 'day' (Monday)

    console.log("Nodes: ", parent.childNodes);
    
</script>
</html>
